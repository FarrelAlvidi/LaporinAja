<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
        <link href="../src/output.css" rel="stylesheet">
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.min.css">
        <title>Document</title>
    
    </head>
    <body>
        <div class="form-login" id="form-login">
            <div class="login-overlay"></div>
            <div class="login-content bg-white h-auto w-[400px] px-8 py-10 rounded">

                <div class="close-btn text-2xl hover:cursor-pointer" onclick="toggleLogin()">&times;</div>
    
                <h1 class="text-center font-semibold text-2xl">LOGIN</h1>
    
                <hr class="mt-5 mb-5">    
    
                <form>
    
                    <label for="email">Email</label><br>
                    <input type="email" name="email" id="email" placeholder="Enter Email" class="w-full px-2 py-2 rounded-md mb-3 border-gray-400 border">
    
                    <br>
                    
                    <label for="password">Password</label><br>
                    <input type="password" name="password" id="password" placeholder="Enter Password" class="w-full px-2 py-2 rounded-md border-gray-400 border">
    
                    <div class="flex justify-between mt-3 mb-2">
                        <div class="flex gap-2">
                            <input type="checkbox" name="rememberMe" id="rememberMe" class="hover:cursor-pointer">
                            <label for="rememberMe" class="hover:cursor-pointer">Remember Me</label>
                        </div>
                        <a href="youtube.com" class="text-red-500 underline hover:no-underline hover:cursor-pointer">Lupa Password?</a>
                    </div>
    
                    <input type="submit" value="LOGIN" class="btn btn-primary w-full py-2 my-2 hover:cursor-pointer border hover:bg-white hover:border-red-600 hover:text-red-600">
    
                </form>
    
                <div class="flex justify-between mt-4 mb-5 w-full" style="align-items: center;">
                    <hr class="border-gray-200 border w-[25%]">
    
                    <p>Or Login With</p;>
    
                    <hr class="border-gray-200 border w-[25%]">
                </div>
    
                <div class="row">
    
                    <button class="border-red-600 border col-span-3 w-[32%] py-2 rounded-md text-red-600 hover:text-white hover:bg-red-600 transition hover:border-none"><i class="fa-brands fa-google"></i></button>
    
                    <button class="border-blue-600 border col-span-3 w-[32%] py-2 rounded-md text-blue-600 hover:text-white hover:bg-blue-600 transition hover:border-none"><i class="fa-brands fa-facebook-f"></i></button>
    
                    <button class="border-gray-600 border col-span-3 w-[32%] py-2 rounded-md text-gray-600 hover:text-white hover:bg-gray-600 transition hover:border-none"><i class="fa-brands fa-x-twitter"></i></button>
    
                </div>
    
            </div>
        </div>
        
    </body>

    <script src="main.js"></script>
</html>
